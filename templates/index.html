{% extends "base.html" %}
{% block title %}JOTTS{% endblock %}
{% block content %}
  {% if notes.is_empty() %}
    <p class="empty">no notes yet</p>
  {% endif %}
  <div class="note-list">
    {% for note in notes %}
      <a href="/notes/{{ note.short_id }}" class="note-item">
        <span class="note-title">{{ note.title }}</span>
        <span class="note-date">{{ note.updated_at }}</span>
      </a>
    {% endfor %}
  </div>
{% endblock %}
